<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aircraft Model Balancer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090d;--surf:#0d1117;--surf2:#111820;--surf3:#161f2a;
  --border:#1a2738;--border2:#223040;
  --accent:#d4a843;--accent2:#4a9fd4;
  --text:#9ab0c0;--texthi:#ddeeff;--textdim:#344d60;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans Condensed',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;display:flex;flex-direction:column}

.hdr{display:flex;align-items:center;gap:16px;padding:9px 18px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(212,168,67,.05) 0%,transparent 55%);flex-shrink:0}
.hdr-title{font-family:var(--sans);font-size:17px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--accent)}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--textdim);text-transform:uppercase}
.hdr-sp{flex:1}
.hdr-tag{font-size:9px;letter-spacing:2px;color:var(--textdim);border:1px solid var(--border2);padding:3px 8px;text-transform:uppercase;white-space:nowrap}

.layout{display:grid;grid-template-columns:286px 1fr;flex:1;overflow:hidden;min-height:0}

/* LEFT */
.left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.sec{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);padding:8px 12px 7px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(212,168,67,.02)}
.srch-w{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.srch-w input{width:100%;background:var(--surf2);border:1px solid var(--border2);color:var(--texthi);font-family:var(--mono);font-size:11px;padding:6px 9px;outline:none;transition:border-color .15s}
.srch-w input:focus{border-color:var(--accent)}
.srch-w input::placeholder{color:var(--textdim)}
.mlist{overflow-y:auto;max-height:220px;border-bottom:1px solid var(--border);flex-shrink:0}
.mlist::-webkit-scrollbar{width:3px}
.mlist::-webkit-scrollbar-thumb{background:var(--border2)}
.mi{padding:6px 12px;cursor:pointer;border-bottom:1px solid rgba(26,39,56,.6);transition:background .1s;display:flex;justify-content:space-between;align-items:center;gap:6px}
.mi:hover{background:var(--surf2)}
.mi.sel{background:rgba(212,168,67,.07);border-left:2px solid var(--accent);padding-left:10px}
.mi-n{font-size:11px;color:var(--texthi);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.mi-t{font-size:9px;color:var(--textdim);white-space:nowrap;flex-shrink:0}
.sa{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:7px;min-height:0}
.sa::-webkit-scrollbar{width:3px}
.sa::-webkit-scrollbar-thumb{background:var(--border2)}
.sr{display:flex;align-items:center;gap:7px}
.sl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--textdim);width:100px;flex-shrink:0}
.si{flex:1;background:var(--surf2);border:1px solid var(--border);color:var(--texthi);font-family:var(--mono);font-size:12px;padding:4px 7px;outline:none;transition:border-color .15s,background .15s;min-width:0}
.si:focus{border-color:var(--accent);background:rgba(212,168,67,.03)}
.si.mod{border-color:rgba(74,159,212,.5);color:var(--accent2)}
.su{font-size:9px;color:var(--textdim);width:36px;flex-shrink:0}
.dr{font-size:9px;color:var(--textdim);letter-spacing:1px;padding:2px 0;display:flex;justify-content:space-between}
.dr span{color:var(--text)}
.rbtn{margin:0 12px 10px;padding:6px;background:transparent;border:1px solid var(--border2);color:var(--textdim);font-family:var(--mono);font-size:10px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .15s;flex-shrink:0}
.rbtn:hover{border-color:var(--accent2);color:var(--accent2)}

/* RIGHT */
.right{display:flex;flex-direction:column;overflow:hidden;min-height:0}
.cbar{display:flex;align-items:center;gap:12px;padding:7px 14px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;background:rgba(0,0,0,.2)}
.cg{display:flex;align-items:center;gap:7px}
.cl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--textdim)}
.cv{font-size:11px;color:var(--accent);min-width:38px}
.cg input[type=range]{width:86px;accent-color:var(--accent);cursor:pointer}
.cg select{background:var(--surf2);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:10px;padding:3px 6px;outline:none;cursor:pointer}
.cs{width:1px;height:18px;background:var(--border);flex-shrink:0}

/* Matrix */
.mxa{flex:1;overflow:auto;padding:10px 14px;min-height:0}
.mxa::-webkit-scrollbar{width:6px;height:6px}
.mxa::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.mtit{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--textdim);margin-bottom:8px;line-height:1.7}
.mtit strong{color:var(--text)}
table.mx{border-collapse:separate;border-spacing:2px;font-family:var(--mono)}
table.mx th{font-size:9px;letter-spacing:1px;color:var(--textdim);text-align:center;padding:4px 6px;background:var(--surf);white-space:nowrap;font-weight:400}
table.mx th.rh{text-align:left;background:transparent;position:sticky;left:0;z-index:2;padding-right:8px;min-width:120px}
table.mx th.gh{color:var(--accent);font-size:8px;letter-spacing:2px;background:transparent}
table.mx td.rl{background:var(--bg);position:sticky;left:0;z-index:1;padding:3px 8px 3px 0;white-space:nowrap}
.rk{font-size:11px;color:var(--text)}
.rs{font-size:9px;color:var(--textdim);margin-top:1px}
.cell{width:88px;min-width:88px;padding:5px 5px 4px;text-align:center;cursor:default;position:relative;transition:filter .1s}
.cell:hover{filter:brightness(1.3);z-index:5}
.cm{font-size:12px;font-weight:500;line-height:1.1}
.cp{font-size:9px;opacity:.7;margin-top:2px}
.cell.emp{background:rgba(255,255,255,.015)!important}
.cell.emp .cm{color:var(--textdim);font-size:9px;letter-spacing:1px}
.tt{display:none;position:absolute;background:var(--surf3);border:1px solid var(--border2);padding:7px 10px;font-size:10px;line-height:1.8;color:var(--text);z-index:200;white-space:nowrap;pointer-events:none;top:calc(100% + 3px);left:50%;transform:translateX(-50%);min-width:170px;box-shadow:0 4px 20px rgba(0,0,0,.7)}
.cell:hover .tt{display:block}
.tr2{display:flex;justify-content:space-between;gap:14px}
.tk{color:var(--textdim)}
.tv{color:var(--texthi)}

.leg{display:flex;align-items:center;gap:6px;padding:5px 14px 6px;border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.ll{font-size:9px;color:var(--textdim);letter-spacing:1px;margin-right:2px}
.lb{width:16px;height:9px}
.ls{font-size:9px;color:var(--textdim)}
.lsp{flex:1}
.ln{font-size:9px;color:var(--textdim)}
.ph{display:flex;align-items:center;justify-content:center;flex:1;color:var(--textdim);font-size:11px;letter-spacing:3px;text-transform:uppercase}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:fi .2s ease forwards}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">Model Balancer</div>
  <div class="hdr-sub">Fleet Economics · Distance × Price Matrix</div>
  <div class="hdr-sp"></div>
  <div class="hdr-tag" id="acTag">No model selected</div>
</div>
<div class="layout">
  <div class="left">
    <div class="sec">Aircraft</div>
    <div class="srch-w"><input type="text" id="srch" placeholder="Search name or family…" oninput="filterModels()"></div>
    <div class="mlist" id="mlist"></div>
    <div class="sec">Parameters <span style="color:var(--textdim);font-size:8px">(live edit)</span></div>
    <div class="sa" id="sa"><div style="color:var(--textdim);text-align:center;margin-top:24px;font-size:11px;letter-spacing:2px">SELECT A MODEL</div></div>
    <button class="rbtn" onclick="resetToBase()">↺ Reset to catalogue values</button>
  </div>
  <div class="right">
    <div class="cbar">
      <div class="cg">
        <span class="cl">Load Factor</span>
        <input type="range" id="lf" min="0.3" max="1.0" step="0.05" value="0.8" oninput="onCtrl()">
        <span class="cv" id="lfv">80%</span>
      </div>
      <div class="cs"></div>
      <div class="cg">
        <span class="cl">Frequency</span>
        <select id="fm" onchange="onCtrl()">
          <option value="max">Max possible</option>
          <option value="half">½ of max</option>
          <option value="fix">Fixed →</option>
        </select>
        <input type="number" id="ff" min="1" max="120" value="14" style="width:44px;background:var(--surf2);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:3px 5px;outline:none" oninput="onCtrl()">
      </div>
      <div class="cs"></div>
      <div class="cg">
        <span class="cl">Oil $/bbl</span>
        <input type="range" id="oil" min="30" max="200" step="5" value="70" oninput="onCtrl()">
        <span class="cv" id="oilv">$70</span>
      </div>
      <div class="cs"></div>
      <div class="cg">
        <span class="cl">Route Type</span>
        <select id="rt" onchange="onCtrl()">
          <option value="international" selected>International</option>
          <option value="domestic">Domestic</option>
          <option value="intercontinental">Intercontinental</option>
        </select>
      </div>
      <div class="cs"></div>
      <div class="cg">
        <span class="cl">Airports</span>
        <select id="fsz" onchange="onCtrl()">
          <option value="5">5</option><option value="6">6</option><option value="7">7</option>
          <option value="8" selected>8</option><option value="9">9</option><option value="10">10</option>
        </select>
        <span style="color:var(--textdim);font-size:10px">→</span>
        <select id="tsz" onchange="onCtrl()">
          <option value="4">4</option><option value="5">5</option><option value="6" selected>6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        </select>
      </div>
    </div>
    <div class="mxa" id="mxa"><div class="ph">Select an aircraft model to begin</div></div>
    <div class="leg">
      <span class="ll">MARGIN:</span>
      <div class="lb" style="background:#0a2e1a"></div><span class="ls">&gt;30%</span>
      <div class="lb" style="background:#0d2a14"></div><span class="ls">20%</span>
      <div class="lb" style="background:#1a2c08"></div><span class="ls">10%</span>
      <div class="lb" style="background:#2a2208"></div><span class="ls">5%</span>
      <div class="lb" style="background:#2a1408"></div><span class="ls">0%</span>
      <div class="lb" style="background:#2a0a0a"></div><span class="ls">−10%</span>
      <div class="lb" style="background:#1e0606"></div><span class="ls">&lt;−20%</span>
      <div class="lsp"></div>
      <span class="ln" id="fnote"></span>
    </div>
  </div>
</div>
<script>
// ── CONSTANTS ──
const MAX_FM=60*16*7,CREW=12,BIF=20,IDUR=4,OBP=70,OBU=1.75;
const CLIMB_M=1.7,CRUISE_M=1.0,DESC_M=0.4,GND_M=0.15;
const PB=[[200,.25],[800,.125],[1000,.1],[Infinity,.05]];
const CP={
  SHORT_RANGE_PROP:{r:720,a:7600,d:6200},LONG_RANGE_PROP:{r:740,a:8200,d:6500},
  SMALL_PROP:{r:680,a:7600,d:6000},REGIONAL_PROP:{r:750,a:8500,d:6800},
  LIGHT:{r:450,a:13000,d:9500},SMALL:{r:620,a:11500,d:9200},
  REGIONAL:{r:680,a:11800,d:9500},MEDIUM:{r:850,a:12500,d:10800},
  EARLY_JET:{r:650,a:11000,d:8500},LARGE:{r:920,a:13500,d:7800},
  X_LARGE:{r:950,a:14000,d:7200},JUMBO:{r:960,a:14000,d:6800},SUPERSONIC:{r:1250,a:18000,d:9500}
};
const TB={SHORT_RANGE_PROP:15,LONG_RANGE_PROP:20,SMALL_PROP:20,REGIONAL_PROP:25,
  EARLY_JET:25,LIGHT:20,SMALL:25,REGIONAL:25,MEDIUM:30,LARGE:40,X_LARGE:50,JUMBO:60,SUPERSONIC:50};
const TD={SHORT_RANGE_PROP:5,LONG_RANGE_PROP:7,SMALL_PROP:5,REGIONAL_PROP:7,
  EARLY_JET:7,LIGHT:5,SMALL:5,REGIONAL:7,MEDIUM:7,LARGE:3.5,X_LARGE:3.5,JUMBO:3,SUPERSONIC:2.5};
const MR={SHORT_RANGE_PROP:85,LONG_RANGE_PROP:105,SMALL_PROP:100,REGIONAL_PROP:110,
  EARLY_JET:160,LIGHT:100,SMALL:120,REGIONAL:140,MEDIUM:150,LARGE:180,X_LARGE:200,JUMBO:220,SUPERSONIC:300};
const PROPS=new Set(['SHORT_RANGE_PROP','LONG_RANGE_PROP','SMALL_PROP','REGIONAL_PROP']);
const EJ=new Set(['DeHaviland Comet 4','DeHaviland Comet 4B','DeHaviland Comet 4C',
  'Boeing 707-120','Boeing 707-120B','Boeing 707-320','Boeing 707-320B','Boeing 720','Boeing 720B',
  'Douglas DC-8-10','Douglas DC-8-21','Douglas DC-8-33','Douglas DC-8-53','Douglas DC-8-61',
  'Douglas DC-8-62','Douglas DC-8-63','Douglas DC-8-71','Douglas DC-8-72','Douglas DC-8-73',
  'Sud-Aviation Caravelle I','Sud-Aviation Caravelle III','Sud-Aviation Caravelle VI','Sud-Aviation Caravelle 10B',
  'Convair CV-880','Convair CV-880M','Convair CV-990A','Tupolev Tu-124','Vickers VC-10 Type 1101']);

function dType(sp,cap,name,yr){
  if(sp>1236)return'SUPERSONIC';
  if(EJ.has(name))return'EARLY_JET';
  if(sp<700){const o=yr<1960;return cap<50?(o?'SHORT_RANGE_PROP':'SMALL_PROP'):(o?'LONG_RANGE_PROP':'REGIONAL_PROP');}
  if(cap<=19)return'LIGHT';if(cap<=50)return'SMALL';if(cap<=124)return'REGIONAL';
  if(cap<=249)return'MEDIUM';if(cap<=345)return'LARGE';if(cap<=475)return'X_LARGE';return'JUMBO';
}
function ph(type,sp,dist){
  const p=CP[type]||{r:700,a:11000,d:9000};
  const isPr=PROPS.has(type),alt=(dist<500&&!isPr)?Math.min(p.a,7600):p.a;
  const ct=(p.d/p.r)*(Math.exp(alt/p.d)-1),dt=ct*0.85;
  const cdD=sp*0.6*(ct+dt)/60,crD=Math.max(0,dist-cdD);
  let crt=crD>0?crD/(sp/60):0,fc=ct,fd=dt;
  if(crt<1){const t=dist/(sp*0.75/60);fc=t*0.5;fd=fc;crt=0;}
  return{climb:fc,cruise:crt,descent:fd,ground:30};
}
function dur(type,sp,dist){const p=ph(type,sp,dist);return Math.floor(p.climb+p.cruise+p.descent+p.ground);}
function mxF(type,sp,rng,dist,cap){
  if(rng<dist)return 0;
  const d=dur(type,sp,dist),t=TB[type]+Math.floor(cap/TD[type]);
  return Math.floor(MAX_FM/((d+t)*2));
}
function sPrice(dist,rt){
  let rem=dist,p=100;
  for(const[c,r]of PB){if(rem<=0)break;p+=Math.min(rem,c)*r;rem-=c;}
  return Math.floor(Math.floor(p*(rt==='intercontinental'?1.1:rt==='international'?1.05:1.0))*1.5);
}
function uc(ob){return ob/OBP*OBU;}
function atc(t,c){
  const f={LIGHT:50,SMALL:100,SMALL_PROP:100,SHORT_RANGE_PROP:100,REGIONAL:250,LONG_RANGE_PROP:250,REGIONAL_PROP:250,SUPERSONIC:2000};
  if(f[t]!==undefined)return f[t];
  const ps={MEDIUM:3.75,EARLY_JET:3.75,LARGE:5,X_LARGE:7,JUMBO:10};
  return Math.floor((ps[t]||3.75)*c);
}
function gf(t){return{LIGHT:50,SMALL:150,SMALL_PROP:150,SHORT_RANGE_PROP:150,REGIONAL:250,LONG_RANGE_PROP:250,REGIONAL_PROP:250,MEDIUM:750,EARLY_JET:750,LARGE:1750,X_LARGE:2500,JUMBO:4000,SUPERSONIC:3000}[t]||750;}
function sf(sz,t,c){return(sz>=7?500:0)+atc(t,c)+gf(t);}
function lf2(sz,t){
  const b=[0,15,25,40,65,100,125,150,175,200,225][Math.min(sz,10)]||250;
  return Math.floor(b*({LIGHT:.5,SMALL:1.5,SMALL_PROP:1.5,SHORT_RANGE_PROP:1.5,REGIONAL:2,LONG_RANGE_PROP:2,REGIONAL_PROP:2,MEDIUM:4,EARLY_JET:4,LARGE:8,X_LARGE:12,JUMBO:16,SUPERSONIC:10}[t]||4));
}
function calc(m,dist,pm,loadf,freq,ob,fsz,tsz,rt){
  const t=dType(m.speed,m.capacity,m.name,m.introYear),u=uc(ob);
  const p=ph(t,m.speed,dist),d=Math.floor(p.climb+p.cruise+p.descent+p.ground);
  const sold=Math.floor(m.capacity*loadf),bp=sPrice(dist,rt);
  const tp=Math.floor(bp*pm),rev=tp*sold*freq;
  const fuel=m.fuelBurn*(p.climb*CLIMB_M+p.cruise*CRUISE_M+p.descent*DESC_M+p.ground*GND_M)*u*freq*(0.7+0.3*loadf);
  const crew=m.capacity*(d/60)*CREW*freq;
  const inf=(BIF+IDUR*d/60)*sold*2*freq; // *2 inside: roundtrip pax cost per Scala formula
  const maint=(MR[t]||150)*m.capacity,dep=Math.floor(m.price/m.lifespan);
  const airp=(sf(fsz,t,m.capacity)+sf(tsz,t,m.capacity)+lf2(fsz,t)+lf2(tsz,t))*freq;
  const tc=Math.floor(fuel+crew+inf+maint+dep+airp),pr=rev-tc;
  return{pr,mg:rev>0?pr/rev:-99,rev,tc,fuel:Math.floor(fuel),crew:Math.floor(crew),
    inf:Math.floor(inf),maint,dep,airp:Math.floor(airp),tp,d,freq,sold};
}
function mc(m){
  if(m>.30)return['#0a2e1a','#2eb872'];if(m>.20)return['#0d2a14','#26a060'];
  if(m>.10)return['#1a2c08','#8ec030'];if(m>.05)return['#2a2208','#c09828'];
  if(m>.00)return['#2a1408','#c06030'];if(m>-.10)return['#2a0a0a','#c03040'];
  if(m>-.20)return['#1e0606','#a02030'];return['#150404','#802020'];
}
function fn(n){if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'M';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(0)+'K';return Math.round(n)+'';}
function fp(m){return(m*100).toFixed(1)+'%';}
function fpr(p){return(p>=0?'+':'')+fn(p);}

// ── MODEL DATA ──
const MODELS=[
 {name:"Airbus A300B2-100",family:"Airbus A300/A310",capacity:336,fuelBurn:Math.floor(7158/60),speed:847,range:3100,price:119600000,lifespan:30*52,introYear:1974},
 {name:"Airbus A300B2-200",family:"Airbus A300/A310",capacity:336,fuelBurn:Math.floor(7700/60),speed:847,range:3400,price:101900000,lifespan:30*52,introYear:1975},
 {name:"Airbus A300B4-100",family:"Airbus A300/A310",capacity:336,fuelBurn:Math.floor(6935/60),speed:847,range:4910,price:124100000,lifespan:30*52,introYear:1975},
 {name:"Airbus A300B4-200",family:"Airbus A300/A310",capacity:336,fuelBurn:Math.floor(7175/60),speed:847,range:5800,price:134800000,lifespan:30*52,introYear:1976},
 {name:"Airbus A300B4-600",family:"Airbus A300/A310",capacity:345,fuelBurn:Math.floor(6634/60),speed:847,range:6288,price:161600000,lifespan:35*52,introYear:1984},
 {name:"Airbus A310-200",family:"Airbus A300/A310",capacity:264,fuelBurn:Math.floor(5241/60),speed:835,range:6906,price:115500000,lifespan:35*52,introYear:1983},
 {name:"Airbus A310-300",family:"Airbus A300/A310",capacity:264,fuelBurn:Math.floor(4840/60),speed:835,range:8364,price:125000000,lifespan:35*52,introYear:1985},
 {name:"Airbus A318",family:"Airbus A320",capacity:136,fuelBurn:Math.floor(2532/60),speed:829,range:5740,price:69500000,lifespan:35*52,introYear:2003},
 {name:"Airbus A319-100",family:"Airbus A320",capacity:156,fuelBurn:Math.floor(2475/60),speed:829,range:6845,price:82250000,lifespan:35*52,introYear:1996},
 {name:"Airbus A319neo",family:"Airbus A320",capacity:160,fuelBurn:Math.floor(2016/60),speed:833,range:6950,price:130100000,lifespan:35*52,introYear:2018},

const DISTS=[50,250,500,750,1250,2500,4000,5750,7250,10000,12000,14000,16000];
const PMULTS=[1.0,0.9,0.8,0.7,0.6,0.5];

let sel=null,em=null;

function filterModels(){
  const q=document.getElementById('srch').value.toLowerCase();
  renderList(MODELS.filter(m=>m.name.toLowerCase().includes(q)||m.family.toLowerCase().includes(q)));
}
function renderList(ms){
  const container = document.getElementById('mlist');
  container.innerHTML = '';
  ms.forEach(m=>{
    const t = dType(m.speed,m.capacity,m.name,m.introYear);
    const s = sel && sel.name===m.name ? 'sel' : '';
    const div = document.createElement('div');
    div.className = `mi ${s}`;
    div.innerHTML = `<span class="mi-n">${m.name}</span><span class="mi-t">${t.replace(/_/g,' ')}</span>`;
    div.addEventListener('click', ()=> pick(m.name));
    container.appendChild(div);
  });
}
function pick(name){sel=MODELS.find(m=>m.name===name);em={...sel};filterModels();renderStats();renderMatrix();}

function renderStats(){
  if(!em)return;
  const t=dType(em.speed,em.capacity,em.name,em.introYear);
  const tat=TB[t]+Math.floor(em.capacity/TD[t]);
  const maint=(MR[t]||150)*em.capacity,dep=Math.floor(em.price/em.lifespan);
  const fields=[{k:'capacity',l:'Capacity',u:'seats'},{k:'fuelBurn',l:'Fuel Burn',u:'kg/min'},
    {k:'speed',l:'Speed',u:'km/h'},{k:'range',l:'Range',u:'km'},
    {k:'price',l:'Price',u:'$'},{k:'lifespan',l:'Lifespan',u:'weeks'}];
  document.getElementById('sa').innerHTML=
    fields.map(f=>`<div class="sr"><span class="sl">${f.l}</span>
      <input class="si${em[f.k]!==sel[f.k]?' mod':''}" type="number" value="${em[f.k]}" oninput="onSt(this,'${f.k}')">
      <span class="su">${f.u}</span></div>`).join('')+
    `<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px;display:flex;flex-direction:column;gap:4px">
      <div class="dr"><span>Type</span><span>${t.replace(/_/g,' ')}</span></div>
      <div class="dr"><span>Turnaround</span><span>${tat} min</span></div>
      <div class="dr"><span>Wkly maint.</span><span>$${fn(maint)}</span></div>
      <div class="dr"><span>Wkly deprec.</span><span>$${fn(dep)}</span></div>
    </div>`;
}
function onSt(el,k){
  const v=parseFloat(el.value);if(isNaN(v)||v<=0)return;
  em[k]=v;el.className='si'+(em[k]!==sel[k]?' mod':'');
  renderStats();renderMatrix();
}
function resetToBase(){if(!sel)return;em={...sel};renderStats();renderMatrix();}

function onCtrl(){
  document.getElementById('lfv').textContent=Math.round(parseFloat(document.getElementById('lf').value)*100)+'%';
  document.getElementById('oilv').textContent='$'+document.getElementById('oil').value;
  renderMatrix();
}
function getFreq(t,sp,rng,dist,cap){
  const mode=document.getElementById('fm').value,mf=mxF(t,sp,rng,dist,cap);
  if(mf===0)return 0;
  if(mode==='max')return mf;
  if(mode==='half')return Math.max(1,Math.floor(mf/2));
  return Math.max(1,parseInt(document.getElementById('ff').value)||1);
}

function renderMatrix(){
  if(!em)return;
  const lf=parseFloat(document.getElementById('lf').value),ob=parseInt(document.getElementById('oil').value);
  const rt=document.getElementById('rt').value,fsz=parseInt(document.getElementById('fsz').value),tsz=parseInt(document.getElementById('tsz').value);
  const t=dType(em.speed,em.capacity,em.name,em.introYear);
  document.getElementById('acTag').textContent=`${t.replace(/_/g,' ')} · ${em.name}`;

  let h=`<div class="mtit ani"><strong>${em.name}</strong> &nbsp;·&nbsp; ${em.capacity} seats &nbsp;·&nbsp; ${em.range.toLocaleString()} km &nbsp;·&nbsp; ${em.fuelBurn} kg/min &nbsp;·&nbsp; ${em.speed} km/h &nbsp;·&nbsp; $${ob}/bbl &nbsp;·&nbsp; ${rt}</div>
  <table class="mx"><thead>
    <tr><th class="rh">Distance</th><th class="gh" colspan="${PMULTS.length}">← DISCOUNTED &nbsp;&nbsp; FARE AS % OF STANDARD PRICE &nbsp;&nbsp; FULL →</th></tr>
    <tr><th class="rh">Freq / Flight</th>${PMULTS.map(p=>`<th>${Math.round(p*100)}%</th>`).join('')}</tr>
  </thead><tbody>`;

  DISTS.forEach(dist=>{
    const oor=dist>em.range,freq=oor?0:getFreq(t,em.speed,em.range,dist,em.capacity);
    const d=oor?0:dur(t,em.speed,dist);
    h+=`<tr><td class="rl"><div class="rk">${dist.toLocaleString()} km</div><div class="rs">${oor?'out of range':freq===0?'no freq':`${freq}× · ${d}min`}</div></td>`;
    PMULTS.forEach(pm=>{
      if(oor||freq===0){h+=`<td class="cell emp"><div class="cm">—</div></td>`;return;}
      const c=calc(em,dist,pm,lf,freq,ob,fsz,tsz,rt);
      const[bg,fg]=mc(c.mg);
      h+=`<td class="cell" style="background:${bg};color:${fg}">
        <div class="cm">${fp(c.mg)}</div>
        <div class="cp">${fpr(c.pr)}</div>
        <div class="tt">
          <div class="tr2"><span class="tk">Ticket price</span><span class="tv">$${c.tp.toLocaleString()}</span></div>
          <div class="tr2"><span class="tk">Revenue/wk</span><span class="tv">$${fn(c.rev)}</span></div>
          <div class="tr2"><span class="tk">Fuel</span><span class="tv">$${fn(c.fuel)}</span></div>
          <div class="tr2"><span class="tk">Crew</span><span class="tv">$${fn(c.crew)}</span></div>
          <div class="tr2"><span class="tk">Inflight</span><span class="tv">$${fn(c.inf)}</span></div>
          <div class="tr2"><span class="tk">Maintenance</span><span class="tv">$${fn(c.maint)}</span></div>
          <div class="tr2"><span class="tk">Depreciation</span><span class="tv">$${fn(c.dep)}</span></div>
          <div class="tr2"><span class="tk">Airport fees</span><span class="tv">$${fn(c.airp)}</span></div>
          <div class="tr2"><span class="tk">Total cost</span><span class="tv">$${fn(c.tc)}</span></div>
        </div>
      </td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table>';

  const mode=document.getElementById('fm').value;
  document.getElementById('fnote').textContent=mode==='max'?'freq = max possible':mode==='half'?'freq = ½ of max':`freq = fixed ${document.getElementById('ff').value}×`;
  document.getElementById('mxa').innerHTML=h;
}

renderList(MODELS);
